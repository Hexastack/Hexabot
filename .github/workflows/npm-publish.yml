name: Publish Hexabot Packages

permissions:
  contents: read

on:
  push:
    tags:
      - "v3.*"

jobs:
  release-metadata:
    runs-on: ubuntu-latest
    outputs:
      npm_tag: ${{ steps.release.outputs.npm_tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve npm dist-tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            npm_tag="alpha"
          elif [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            npm_tag="beta"
          elif [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            npm_tag="latest"
          else
            echo "Unsupported release tag '$GITHUB_REF_NAME'. Expected vX.Y.Z, vX.Y.Z-alpha.N, or vX.Y.Z-beta.N."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"
          echo "Publishing version $version with npm dist-tag '$npm_tag'."

  publish-agentic:
    needs: release-metadata
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          standalone: true
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: pnpm
          registry-url: "https://registry.npmjs.org/"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.V3_NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --filter "@hexabot-ai/agentic..." --prod=false

      - name: Build the package
        run: pnpm --filter "@hexabot-ai/agentic..." run build

      - name: Publish to npm
        working-directory: packages/agentic
        run: pnpm publish --tag "$NPM_DIST_TAG" --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.V3_NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.release-metadata.outputs.npm_tag }}

  publish-types:
    needs:
      - release-metadata
      - publish-agentic
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          standalone: true
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: pnpm
          registry-url: "https://registry.npmjs.org/"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.V3_NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --filter "@hexabot-ai/types..." --prod=false

      - name: Build the package
        run: pnpm --filter "@hexabot-ai/types..." run build

      - name: Publish to npm
        working-directory: packages/types
        run: pnpm publish --tag "$NPM_DIST_TAG" --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.V3_NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.release-metadata.outputs.npm_tag }}

  publish-package:
    needs:
      - release-metadata
      - publish-types
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: api
            scope: "@hexabot-ai/api"
            working-directory: packages/api
          - package: cli
            scope: "@hexabot-ai/cli"
            working-directory: packages/cli
          - package: widget
            scope: "@hexabot-ai/widget"
            working-directory: packages/widget
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          standalone: true
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: pnpm
          registry-url: "https://registry.npmjs.org/"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.V3_NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --filter "${{ matrix.scope }}..." --prod=false

      - name: Build the package
        run: pnpm --filter "${{ matrix.scope }}..." run build

      - name: Publish to npm
        working-directory: ${{ matrix.working-directory }}
        run: pnpm publish --tag "$NPM_DIST_TAG" --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.V3_NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.release-metadata.outputs.npm_tag }}
