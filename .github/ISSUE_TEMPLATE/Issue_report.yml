name: "📝 Issue"
description: Report a bug, request a feature, or ask for an improvement with one concise input.
title: "[Issue] <short title>"
labels: ["triage"]
body:
  - type: textarea
    id: details
    attributes:
      label: "Details"
      description: "Describe the issue or request in one message."
      placeholder: |
        Suggested structure (keep what applies):
        - Problem: What is happening (or what is missing)?
        - Context: Where/when does this occur?
        - Steps: How can we reproduce it?
        - Expected: What should happen instead?
        - Impact: Who is affected and how severe is it?
        - Extra: Logs, screenshots, links, related issues/PRs.
    validations:
      required: true
